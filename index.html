<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="taskflow.css">
</head>
<body>

  <!--Login page -->
  <div id="loginPage">
    <div class="page-title text-center mt-5">
      <h1>TaskFlow</h1>
    </div>

    <div class="container d-flex justify-content-center align-items-center login-container">
      <div id="loginScreen" class="card p-4 shadow login-box">
        <form>
          <p class="text-center intro-text">
            Organise your tasks.<br>
            Please insert your name.
          </p>

          <input
            type="text"
            id="usernameInput"
            class="form-control mb-3"
            placeholder="Enter your username"
          >

          <button id="startBtn" class="btn w-100">
            START
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="appScreen" class="d-none app-screen">

    <header class="main-header">

      <div class="header-button">
        <button id="filterBtn">Filters</button>

        <div id="filterMenu" class="filter-menu d-none">
          <button class="filter-option" data-filter="all">All</button>
          <button class="filter-option" data-filter="today">Today</button>
          <button class="filter-option" data-filter="pending">Pending</button>
          <button class="filter-option" data-filter="completed">Completed</button>

          <hr>

          <p>Priority</p>
          <button class="filter-option" data-filter="high">High</button>
          <button class="filter-option" data-filter="medium">Medium</button>
          <button class="filter-option" data-filter="low">Low</button>
        </div>
      </div>

      <div class="header-logo">
        <h1>TaskFlow</h1>
      </div>

      <div class="header-user">
        <p id="welcomeMessage"></p>
        <button id="logoutBtn">Logout</button>
      </div>

    </header>

    <!-- Main content-->
    <main class="main-content">

  <!-- Search bar-->
      <div class="search-add-area">
        <input
          type="text"
          id="searchTaskInput"
          placeholder="Search task by name..."
        >

        <button id="openTaskFormBtn">
          + Add
        </button>

        <button id="exportBtn">
          Export
        </button>

        <input type="file" id="importFile" accept=".json" hidden>

        <button id="importBtn">
          Import
        </button>
      </div>

      <!-- Task form-->
      <div id="taskFormBox" class="task-form-box d-none">
        <h3>New task</h3>

        <input
          type="text"
          id="taskNameInput"
          class="form-control mb-3"
          placeholder="Task name"
        >

        <input
          type="date"
          id="taskDateInput"
          class="form-control mb-3"
        >

        <select id="taskImportanceInput" class="form-control mb-3">
          <option value="">Select importance</option>
          <option value="Low">LOW</option>
          <option value="Medium">MEDIUM</option>
          <option value="High">HIGH</option>
        </select>

        <button id="addTaskBtn">Add</button>
      </div>

      <div id="emptyMessage" class="empty-message">
        <p>There are no tasks added yet</p>
      </div>

      <div id="taskList" class="task-list"></div>

    </main>
  </div>

  <script src="taskflow.js"></script>
</body>
</html>
